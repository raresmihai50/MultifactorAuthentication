services:
  db:
    image: postgres:16-alpine
    container_name: mfa_postgres
    restart: always
    environment:
      POSTGRES_USER: mfa_user
      POSTGRES_PASSWORD: 1221
      POSTGRES_DB: mfa_database
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: